<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <title>Data Pengguna</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body class="bg-blue-100 p-10">

        <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">

            <h1 class="text-2xl font-bold mb-4">
                Data Pengguna
            </h1>

            <div class="flex gap-2 mb-4 w-full">
                <form onsubmit="saveUser(event)" class="flex gap-2 w-full">

                    <input id="nama" required class="border mx-auto p-2 w-full" placeholder="Nama Lengkap">

                    <input id="email" type="email" required="@gmail.com" class="border mx-auto p-2 w-full" placeholder="Email">

                    <button type="submit" class="bg-blue-500 text-white px-4 py-2">
                    Simpan
                    </button>
                </form>
            </div>

            <table class="w-full border">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="border p-2">ID</th>
                        <th class="border p-2">Nama</th>
                        <th class="border p-2">Email</th>
                        <th class="border p-2">Aksi</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>

        </div>

        <script src="script.js"></script>

    </body>
</html>
